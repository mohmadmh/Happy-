<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معايدة محمد</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Aref+Ruqaa:wght@400;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Amiri', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* تأثير الإضاءة السينمائية */
        .spotlight {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 30%, rgba(245, 158, 11, 0.15) 0%, transparent 70%);
            pointer-events: none;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            animation: fadeIn 1.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .image-wrapper {
            width: 280px;
            height: 380px;
            margin: 0 auto 20px;
            border-radius: 20px;
            padding: 8px;
            background: linear-gradient(145deg, #b45309, #d97706);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
        }

        h1 {
            font-family: 'Aref Ruqaa', serif;
            font-size: 3.5rem;
            color: #fbbf24;
            margin: 10px 0;
        }

        .text {
            font-size: 1.3rem;
            color: #cbd5e1;
        }
    </style>
</head>
<body>
    <div class="spotlight"></div>
    <div class="container">
        <div class="image-wrapper">
            <img src="my-photo.jpg" alt="محمد">
        </div>
        <h1>عيدكم مبارك</h1>
        <p class="text">كل عام وأنتم بخير.. محبكم محمد</p>
    </div>
</body>
</html>
