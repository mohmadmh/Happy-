<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معايدة محمد</title>
    <style>
        /* استيراد خطوط عربية فخمة */
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Reem+Kufi:wght@500&display=swap');

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #050a15; /* لون ليلي عميق */
            font-family: 'Amiri', serif;
            overflow: hidden;
            color: white;
        }

        /* خلفية الإضاءة المتحركة */
        .background-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 40%, rgba(180, 83, 9, 0.2) 0%, transparent 60%);
            z-index: 1;
        }

        .card {
            position: relative;
            z-index: 10;
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            padding: 40px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            max-width: 400px;
            animation: slideUp 1s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-img {
            width: 220px;
            height: 300px;
            object-fit: cover;
            border-radius: 20px;
            border: 3px solid #d97706;
            box-shadow: 0 0 20px rgba(217, 119, 6, 0.5);
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Reem Kufi', sans-serif;
            font-size: 2.8rem;
            color: #fbbf24;
            margin: 10px 0;
            text-shadow: 0 0 15px rgba(251, 191, 36, 0.5);
        }

        p {
            font-size: 1.4rem;
            color: #e2e8f0;
            line-height: 1.6;
        }

        .sparkle {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle 2s infinite;
        }

        @keyframes twinkle {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.5); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="background-glow"></div>
    
    <div class="card">
        <img src="data:image/png;base64,{{IMAGE_DATA}}" class="profile-img" alt="محمد">
        
        <h1>عيدكم مبارك</h1>
        <p>بكل معاني الود والتقدير،<br> أهنئكم بحلول العيد السعيد.</p>
        
        <div style="margin-top: 20px; color: #fbbf24; font-weight: bold;">
            — محبكم محمد —
        </div>
    </div>

    <script>
        // إضافة نجوم متلألئة في الخلفية
        for (let i = 0; i < 50; i++) {
            let star = document.createElement('div');
            star.className = 'sparkle';
            star.style.width = star.style.height = Math.random() * 3 + 'px';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.animationDelay = Math.random() * 2 + 's';
            document.body.appendChild(star);
        }
    </script>
</body>
</html>
