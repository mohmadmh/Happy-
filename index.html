<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معايدة محمد</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Reem+Kufi:wght@500&display=swap');
        body { margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background: #050a15; font-family: 'Amiri', serif; overflow: hidden; color: white; }
        .card { position: relative; z-index: 10; text-align: center; background: rgba(255, 255, 255, 0.05); padding: 30px; border-radius: 25px; backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.5); width: 320px; animation: slideUp 1.2s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }
        .profile-img { width: 100%; height: auto; max-height: 350px; object-fit: cover; border-radius: 15px; border: 2px solid #fbbf24; margin-bottom: 15px; }
        h1 { font-family: 'Reem Kufi', sans-serif; font-size: 2.5rem; color: #fbbf24; margin: 10px 0; }
        p { font-size: 1.2rem; color: #cbd5e1; }
    </style>
</head>
<body>
    <div class="card">
        <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwAEhQGAhKmMIQAAAABJRU5ErkJggg==" id="myImg" class="profile-img">
        <h1>عيدكم مبارك</h1>
        <p>كل عام وأنتم بخير<br>محبكم محمد</p>
    </div>
    <script>
        // هذا السطر يضع صورتك المرفوعة في المكان الصحيح
        document.getElementById('myImg').src = "data:image/png;base64,{{IMAGE_DATA}}";
    </script>
</body>
</html>
